<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<div class="container-flruid">
    <div th:replace="~{plantillas/plantilla :: alerts}"></div>

    <main class="container text-center col-md-10 p-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h1 class="card-header"><strong><p th:text="${contenido}"></p></strong></h1>
        <div class="card-body">
            <div class="col-md-9">
                <div class="form-floating">
                    <form th:action="@{/productos/salvar-imagen}" method="post" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="imagenarchivo">Subir imagen (opcional)</label>
                            <div class="input-group mb-1">
                                <input type="file" class="form-control" id="imagenarchivo" name="imagenarchivo"/>
                                <button type="submit" class="btn btn-primary">Subir imagen</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <form th:action="@{/productos/salvar-producto}" th:object="${producto}" method="post">
                <div th:if="${#fields.hasErrors('*')}" class='alert alert-danger' role="alert">
                    Verifique los siguientes errores
                    <ul>
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"/>
                    </ul>
                </div>
                <div class="row gx-5">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label for="nombre">Nombre </label>
                            <input type="text"
                                   th:class="${#fields.hasErrors('nombre')}? 'form-control is-invalid':form-control"
                                   id="nombre"
                                   name="nombre"
                                   placeholder="Nombre del producto" required="required"
                                   th:field="*{nombre}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="precio">Precio:</label>
                            <input type="text"
                                   th:class="${#fields.hasErrors('precio')}? 'form-control is-invalid':form-control"
                                   id="precio" name="precio"
                                   placeholder="Precio del producto" required="required"
                                   th:field="*{precio}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="stock">Almacen:</label>
                            <input type="text"
                                   th:class="${#fields.hasErrors('stock')}? 'form-control is-invalid':form-control"
                                   id="stock" name="stock"
                                   placeholder="Cantidad en almacen" required="required"
                                   th:field="*{stock}">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group">
                            <label for="imagen">Imagen:</label>
                            <br/>
                            <img class="img-thumbnail"
                                 id="imagen"
                                 th:src="@{'/imagenes/ventas/'+*{imagen}}"
                                 width="90%" height="90%"><br/>
                        </div>

                    </div>
                    <div class="col-md-12">
                        <br/>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </div>
                <input type="hidden" name="id_producto" th:value="${producto.id_producto}"/>
            </form>
        </div>
    </main>
</div>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
<div th:replace="~{plantillas/plantilla::paginaScripts}"></div>
</body>
</html>
