<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hola Mundo con Lluvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        h1 {
            position: absolute;
            top: 40px;
            font-size: 3rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255,255,255,0.6);
        }

        /* Árbol */
        .tree {
            position: relative;
            width: 100px;
            height: 150px;
        }

        .trunk {
            position: absolute;
            bottom: 0;
            left: 45px;
            width: 10px;
            height: 60px;
            background: #5a3e2b;
            border-radius: 3px;
        }

        .leaves {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #2ecc71 40%, #27ae60 70%);
            border-radius: 50%;
            animation: sway 3s ease-in-out infinite alternate;
        }

        @keyframes sway {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
        }

        /* Lluvia */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: rgba(173,216,230,0.7);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<h1>Hola Mundo</h1>

<div class="tree">
    <div class="leaves"></div>
    <div class="trunk"></div>
</div>

<div class="rain" id="rain"></div>

<script>
    const rainContainer = document.getElementById("rain");

    function createDrop() {
        const drop = document.createElement("div");
        drop.classList.add("drop");

        drop.style.left = Math.random() * window.innerWidth + "px";
        drop.style.animationDuration = (0.5 + Math.random()) + "s";
        drop.style.opacity = Math.random();

        rainContainer.appendChild(drop);

        setTimeout(() => {
            drop.remove();
        }, 1500);
    }

    setInterval(createDrop, 50);
</script>

</body>
</html>
